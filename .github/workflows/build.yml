name: Build Debug APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17 (required for AGP 9.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Set up Gradle (generates the wrapper since gradlew is not in the repo)
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      # 4. Create the .env file from GitHub Secrets or defaults so the Secrets Gradle Plugin can read it
      - name: Create .env file from secrets
        run: |
          URL="${{ secrets.INSFORGE_PROJECT_URL }}"
          KEY="${{ secrets.INSFORGE_ANON_KEY }}"
          CLOUD="${{ secrets.CLOUDINARY_CLOUD_NAME }}"
          PRESET="${{ secrets.CLOUDINARY_UPLOAD_PRESET }}"
          
          echo "INSFORGE_PROJECT_URL=${URL:-https://ywy9d5pe.eu-central.insforge.app}" > .env
          echo "INSFORGE_ANON_KEY=${KEY:-anon_a5a93998a5fc7576abb114d44780878005623a505a8e821c827b1e3f4532934f}" >> .env
          echo "CLOUDINARY_CLOUD_NAME=${CLOUD:-dlct4kt1s}" >> .env
          echo "CLOUDINARY_UPLOAD_PRESET=${PRESET:-nexgenbykgc}" >> .env

      # 5. Create a placeholder google-services.json (plugin is set to WARN so it won't fail)
      - name: Create placeholder google-services.json
        run: |
          cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "nexgen-lms-placeholder",
              "storage_bucket": "nexgen-lms-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": { "package_name": "com.kgc.nexgenlms.app" }
                },
                "api_key": [{ "current_key": "placeholder" }],
                "services": {}
              }
            ],
            "configuration_version": "1"
          }
          EOF

      # 6. Create a debug keystore so the debug signing config doesn't fail
      - name: Create debug keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug, O=Android, C=US"

      # 7. Cache Gradle dependencies to speed up future builds
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 8. Build the debug APK
      - name: Build Debug APK
        run: gradle app:assembleDebug --no-configuration-cache
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # 9. Upload the APK as a downloadable artifact (available for 7 days)
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NexGen-LMS-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: error
